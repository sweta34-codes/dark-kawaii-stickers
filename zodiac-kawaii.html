<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dark Kawaii Zodiac</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #060008;
    --purple: #9933ff;
    --pink: #ff44cc;
    --lavender: #c99ee8;
    --dark: #1a0a2e;
    --glow: #cc44ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #1a003344 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #00003344 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 1rem;
    position: relative;
    z-index: 1;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 7vw, 4.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #ff44cc, #cc44ff, #6644ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    letter-spacing: -1px;
  }
  header p {
    color: #5533aa;
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3d1a5a, transparent);
    margin: 1.5rem 0;
  }

  /* Sign picker */
  .picker {
    text-align: center;
    padding: 0 1rem 2rem;
    position: relative;
    z-index: 1;
  }
  .picker p {
    font-size: 0.65rem;
    color: #6633aa;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .signs-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    max-width: 700px;
    margin: 0 auto;
  }
  .sign-btn {
    background: #0f0018;
    border: 1px solid #2d1a4a;
    border-radius: 30px;
    color: #7755aa;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sign-btn:hover { background: #1a0a2e; border-color: var(--purple); color: var(--lavender); }
  .sign-btn.active { background: #2d1a4a; border-color: var(--pink); color: white; box-shadow: 0 0 12px #ff44cc44; }

  /* Card display */
  .card-area {
    max-width: 500px;
    margin: 0 auto 3rem;
    padding: 0 1.5rem;
    position: relative;
    z-index: 1;
  }

  .zodiac-card {
    background: #0a0015;
    border: 1px solid #2d1a4a;
    border-radius: 20px;
    padding: 2rem;
    text-align: center;
    transition: all 0.4s ease;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .zodiac-card svg {
    width: 180px;
    height: 180px;
    margin: 0 auto 1.5rem;
    display: block;
    filter: drop-shadow(0 0 16px #cc44ff66);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 10px #cc44ff44); }
    50% { filter: drop-shadow(0 0 24px #cc44ffaa); }
  }

  .sign-symbol {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    display: block;
  }
  .sign-name {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 0.25rem;
  }
  .sign-dates {
    font-size: 0.65rem;
    color: #5533aa;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .divider-card {
    height: 1px;
    background: linear-gradient(90deg, transparent, #3d1a5a, transparent);
    margin: 1.25rem 0;
  }

  .vibe-tag {
    display: inline-block;
    background: #1a0a2e;
    border: 1px solid #3d1a5a;
    border-radius: 20px;
    padding: 0.3rem 0.8rem;
    font-size: 0.6rem;
    color: var(--pink);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 0.25rem;
  }

  .horoscope-text {
    font-size: 0.78rem;
    color: #9977bb;
    line-height: 1.9;
    margin: 1.25rem 0;
    text-align: left;
    border-left: 2px solid #3d1a5a;
    padding-left: 1rem;
  }

  .power-move {
    background: #150020;
    border: 1px solid #4a1a6e;
    border-radius: 12px;
    padding: 1rem;
    margin-top: 1rem;
  }
  .power-move p:first-child {
    font-size: 0.6rem;
    color: #6633aa;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 0.4rem;
  }
  .power-move p:last-child {
    font-size: 0.8rem;
    color: var(--lavender);
    font-weight: 700;
  }

  .share-text {
    margin-top: 1.5rem;
    background: #0f0018;
    border: 1px solid #2d1a4a;
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.7rem;
    color: #7755aa;
    text-align: left;
    line-height: 1.7;
  }
  .share-text span { color: var(--pink); }

  .copy-btn {
    width: 100%;
    margin-top: 0.75rem;
    background: linear-gradient(135deg, #6600cc, #cc0088);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    padding: 0.75rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 3px;
    transition: all 0.2s;
  }
  .copy-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px #9933ff66; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #3d1a5a;
  }
  .empty-state p:first-child { font-size: 2rem; margin-bottom: 0.5rem; }
  .empty-state p:last-child { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; }

  /* floating stars */
  .star {
    position: fixed;
    pointer-events: none;
    animation: twinkle 3s ease-in-out infinite;
    opacity: 0.3;
    z-index: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(0.8); }
    50% { opacity: 0.5; transform: scale(1.2); }
  }
</style>
</head>

function renderCard(sign) {
  const card = document.getElementById('zodiacCard');
  card.innerHTML = `
    <span class="sign-symbol">${sign.symbol}</span>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      ${drawFace(sign)}
    </svg>
    <p class="sign-name" style="color:${sign.color}">${sign.name}</p>
    <p class="sign-dates">${sign.dates} · ${sign.element}</p>
    <div>${sign.vibes.map(v => `<span class="vibe-tag">${v}</span>`).join('')}</div>
    <div class="divider-card"></div>
    <p class="horoscope-text">${sign.horoscope}</p>
    <div class="power-move">
      <p>⚡ power move this week</p>
      <p>${sign.powerMove}</p>
    </div>
    <div class="share-text">
      <span>instagram caption ready 👇</span><br/><br/>
      ${sign.shareCaption}
    </div>
    <button class="copy-btn" onclick="copyCaption('${sign.shareCaption.replace(/'/g, "\\'")}')">Copy Caption ↗</button>
  `;
}

function copyCaption(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'Copied! 💀'; setTimeout(() => btn.textContent = 'Copy Caption ↗', 2000); }
  });
}

// Build sign buttons
const grid = document.getElementById('signsGrid');
signs.forEach(sign => {
  const btn = document.createElement('button');
  btn.className = 'sign-btn';
  btn.textContent = `${sign.symbol} ${sign.name}`;
  btn.onclick = () => {
    document.querySelectorAll('.sign-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCard(sign);
  };
  grid.appendChild(btn);
});
</script>

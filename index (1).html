<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dark Kawaii Sticker Pack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #070010;
    --purple: #9933ff;
    --pink: #ff44cc;
    --lavender: #c99ee8;
    --dark: #1a0a2e;
    --glow: #cc44ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 800;
    background: linear-gradient(135deg, #ff44cc, #cc44ff, #9933ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
    text-transform: uppercase;
  }

  header p {
    color: #7744aa;
    font-size: 0.75rem;
    letter-spacing: 4px;
    margin-top: 0.5rem;
    text-transform: uppercase;
  }

  .pack-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 2rem;
    padding: 2rem 3rem;
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .sticker-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }

  .sticker-card:hover {
    transform: scale(1.08) rotate(-1deg);
  }

  .sticker-card:hover svg {
    filter: drop-shadow(0 0 18px var(--glow));
  }

  .sticker-card svg {
    width: 180px;
    height: 180px;
    transition: filter 0.3s ease;
    filter: drop-shadow(0 0 8px #6600cc88);
  }

  .sticker-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--lavender);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
  }

  .mood-tag {
    font-size: 0.6rem;
    color: #6633aa;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  /* Meme Section */
  .meme-section {
    max-width: 700px;
    margin: 1rem auto 4rem;
    padding: 0 2rem;
    position: relative;
    z-index: 1;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--pink);
    text-transform: uppercase;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .meme-builder {
    background: #0f0018;
    border: 1px solid #3d1a5a;
    border-radius: 16px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .meme-preview {
    position: relative;
    width: 320px;
    height: 320px;
    background: linear-gradient(135deg, #0a0015, #150020);
    border-radius: 12px;
    border: 1px solid #3d1a5a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .meme-preview::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 60%, #2a0a3a44, transparent 70%);
  }

  .meme-preview svg {
    width: 140px;
    height: 140px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 12px #cc44ff88);
  }

  .meme-top-text {
    position: absolute;
    top: 16px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: white;
    text-shadow: 0 0 10px #cc44ff, 2px 2px 0 #000;
    z-index: 2;
    padding: 0 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .meme-bottom-text {
    position: absolute;
    bottom: 16px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: var(--pink);
    text-shadow: 0 0 10px #ff44cc, 2px 2px 0 #000;
    z-index: 2;
    padding: 0 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .meme-inputs {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
  }

  .meme-inputs input {
    background: #1a0a2e;
    border: 1px solid #4a1a6e;
    border-radius: 8px;
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 0.65rem 1rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }

  .meme-inputs input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 8px #9933ff44;
  }

  .meme-inputs input::placeholder { color: #4a2a6a; }

  .mood-selector {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mood-btn {
    background: #1a0a2e;
    border: 1px solid #3d1a5a;
    border-radius: 20px;
    color: #9977bb;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .mood-btn:hover, .mood-btn.active {
    background: #3d1a5a;
    border-color: var(--purple);
    color: var(--lavender);
    box-shadow: 0 0 8px #9933ff44;
  }

  .dl-btn {
    background: linear-gradient(135deg, #6600cc, #cc0088);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 0.75rem 2rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 3px;
    transition: all 0.2s;
    box-shadow: 0 0 20px #6600cc44;
  }

  .dl-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px #9933ff88;
  }

  /* Floating sparkles */
  .sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 1rem;
    animation: floatUp 4s linear infinite;
    opacity: 0;
    z-index: 0;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 0.7; }
    80% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-100px) scale(1.2); }
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 8px #6600cc88); }
    50% { filter: drop-shadow(0 0 20px #cc44ffaa); }
  }

  .sticker-card svg {
    animation: pulse-glow 3s ease-in-out infinite;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3d1a5a, transparent);
    margin: 1rem 0 2.5rem;
  }
</style>
</head>
